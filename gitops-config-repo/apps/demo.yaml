apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
    spec:
      containers:
      - name: demo
        image: docker.io/<dockerhub_username>/demo:1.0.0 # {"$imagepolicy": "flux-system:demo"}
        ports:
        - containerPort: 8089
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: demo
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8089
    protocol: TCP
  selector:
    app: demo
