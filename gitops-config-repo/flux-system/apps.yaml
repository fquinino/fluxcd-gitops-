apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 1m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  path: ./gitops-config-repo/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
